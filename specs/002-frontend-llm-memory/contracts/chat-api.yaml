openapi: 3.1.0
info:
  title: Appointment Bot Chat and Session API
  version: 2.0.0
  description: |
    Conversational backend contract for the appointment workflow, returning
    session restoration signals and remembered-identity management data for the
    companion UI.
    
    Historical planning artifact: the remembered-identity portions of this
    contract describe exploratory scope that was intentionally not kept in the
    delivered product.
paths:
  /chat:
    post:
      summary: Continue or start a conversation turn
      operationId: postChatMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Conversational turn completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Temporary backend dependency failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sessions/new:
    post:
      summary: Create a fresh chat session and optionally restore remembered identity
      operationId: createSession
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSessionRequest'
      responses:
        '200':
          description: New session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewSessionResponse'
  /remembered-identity/forget:
    post:
      summary: Revoke a remembered identity for the current patient context
      operationId: forgetRememberedIdentity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgetRememberedIdentityRequest'
      responses:
        '200':
          description: Remembered identity cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgetRememberedIdentityResponse'
components:
  schemas:
    ChatRequest:
      type: object
      additionalProperties: false
      required:
        - session_id
        - message
      properties:
        session_id:
          type: string
        message:
          type: string
        remembered_identity_id:
          type: string
          nullable: true
          description: Optional remembered identity selected for a fresh session.
    AppointmentSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - date
        - time
        - doctor
        - status
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        doctor:
          type: string
        status:
          type: string
          enum: [scheduled, confirmed, canceled]
    ActionResult:
      type: object
      additionalProperties: false
      required:
        - action
        - outcome
      properties:
        action:
          type: string
        outcome:
          type: string
        appointment_id:
          type: string
          nullable: true
    RememberedIdentitySummary:
      type: object
      additionalProperties: false
      required:
        - remembered_identity_id
        - status
      properties:
        remembered_identity_id:
          type: string
        status:
          type: string
          enum: [active, expired, revoked, unavailable]
        display_name:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
    ChatResponse:
      type: object
      additionalProperties: false
      required:
        - response
        - verified
        - current_action
        - thread_id
        - remembered_identity_status
      properties:
        response:
          type: string
        verified:
          type: boolean
        current_action:
          type: string
        thread_id:
          type: string
        appointments:
          type: array
          items:
            $ref: '#/components/schemas/AppointmentSummary'
        last_action_result:
          $ref: '#/components/schemas/ActionResult'
        error_code:
          type: string
          nullable: true
        remembered_identity_status:
          $ref: '#/components/schemas/RememberedIdentitySummary'
    NewSessionRequest:
      type: object
      additionalProperties: false
      properties:
        remembered_identity_id:
          type: string
          nullable: true
    NewSessionResponse:
      type: object
      additionalProperties: false
      required:
        - session_id
        - thread_id
        - restored_verification
      properties:
        session_id:
          type: string
        thread_id:
          type: string
        restored_verification:
          type: boolean
        remembered_identity_status:
          $ref: '#/components/schemas/RememberedIdentitySummary'
        response:
          type: string
          nullable: true
    ForgetRememberedIdentityRequest:
      type: object
      additionalProperties: false
      required:
        - remembered_identity_id
      properties:
        remembered_identity_id:
          type: string
    ForgetRememberedIdentityResponse:
      type: object
      additionalProperties: false
      required:
        - cleared
      properties:
        cleared:
          type: boolean
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - detail
      properties:
        detail:
          type: string
