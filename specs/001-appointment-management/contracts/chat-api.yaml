openapi: 3.1.0
info:
  title: Conversational Appointment Management API
  version: 1.0.0
  description: |
    Conversational API for verifying a clinic patient and managing appointments
    through a single chat endpoint.
paths:
  /chat:
    post:
      summary: Continue a patient appointment-management conversation
      operationId: postChatMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Conversational turn completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Temporary backend dependency failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ChatRequest:
      type: object
      additionalProperties: false
      required:
        - session_id
        - message
      properties:
        session_id:
          type: string
          minLength: 1
          description: Stable client session identifier used to resume the same conversation thread.
        message:
          type: string
          minLength: 1
          description: Latest patient message in plain natural language.
    AppointmentSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - date
        - time
        - doctor
        - status
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        doctor:
          type: string
        status:
          type: string
          enum:
            - scheduled
            - confirmed
            - canceled
    ActionResult:
      type: object
      additionalProperties: false
      required:
        - action
        - outcome
      properties:
        action:
          type: string
          enum:
            - verify_identity
            - list_appointments
            - confirm_appointment
            - cancel_appointment
            - help
            - unknown
        outcome:
          type: string
        appointment_id:
          type: string
    ChatResponse:
      type: object
      additionalProperties: false
      required:
        - response
        - verified
        - current_action
        - thread_id
      properties:
        response:
          type: string
          description: Assistant reply for the current conversational turn.
        verified:
          type: boolean
          description: Whether the patient has completed identity verification.
        current_action:
          type: string
          enum:
            - verify_identity
            - list_appointments
            - confirm_appointment
            - cancel_appointment
            - help
            - unknown
        thread_id:
          type: string
          description: Workflow thread identifier associated with the supplied session.
        appointments:
          type: array
          items:
            $ref: '#/components/schemas/AppointmentSummary'
        last_action_result:
          $ref: '#/components/schemas/ActionResult'
        error_code:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - detail
      properties:
        detail:
          type: string
