services:
  api:
    build:
      context: .
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      SESSION_TTL_MINUTES: ${SESSION_TTL_MINUTES:-60}
      MAX_VERIFICATION_ATTEMPTS: ${MAX_VERIFICATION_ATTEMPTS:-3}
      FRONTEND_API_BASE_URL: http://api:8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      FRONTEND_API_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"
